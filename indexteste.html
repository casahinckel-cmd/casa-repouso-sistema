<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Formulário</title>
</head>
<body>

  <h2>Enviar dados para Google Sheets</h2>

  <form id="formulario">
    <input type="text" id="nome" placeholder="Nome" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <textarea id="mensagem" placeholder="Mensagem"></textarea><br><br>
    <button type="submit">Enviar</button>
  </form>

  <p id="status"></p>

  <script>
    const form = document.getElementById('formulario');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        mensagem: document.getElementById('mensagem').value
      };

      fetch('https://script.google.com/macros/s/AKfycbwcKzafFyQuTOtRThYvnOqeOQawhBuI5uhFposFOvGFcr7025Fn1Lqu38-U2yUYQHXtLQ/exec', {
        method: 'POST',
        body: JSON.stringify(dados)
      })
      .then(res => res.json())
      .then(() => {
        document.getElementById('status').innerText = 'Dados enviados com sucesso!';
        form.reset();
      })
      .catch(() => {
        document.getElementById('status').innerText = 'Erro ao enviar dados.';
      });
    });
  </script>

</body>
</html>
